
<button
  class="nav__button"
  type="button"
  [ngClass]="{ 'nav__button--active': isActive }"
  (click)="onClick($event)">
  <div class="nav__button-icon">
    @if (isActive && iconUrlActive !== null) {
      <img [ngSrc]="iconUrlActive" width="24" height="24" alt="active icon">
    } @else {
      <img [ngSrc]="iconUrl" width="24" height="24" alt="non-active icon">
    }
  </div>
  <span class="nav__button-name">{{ text }}</span>
</button>
