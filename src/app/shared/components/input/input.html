
<div class="form-control">
  <div class="form-icon">
    @if (prefixIconUrl()) {
      <img [src]="prefixIconUrl()" width="24" height="24" alt="user">
    }
  </div>
  <label class="form-label">
    <input
      class="form-input"
      [type]="type()"
      [placeholder]="placeholder()"
      (input)="handleInput($event)"
    >
  </label>
  @if (postfixIconUrl()) {
    <img [src]="postfixIconUrl()" width="24" height="24" alt="user">
  }
</div>
