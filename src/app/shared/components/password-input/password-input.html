
<div class="form-control">
  <div class="form-icon">
    <img src="/icons/lock.svg" width="24" height="24" alt="lock">
  </div>
  <label class="form-label">
    <input
      class="form-input"
      [type]="type"
      name="password"
      placeholder="Пароль"
      [disabled]="disabled"
      (input)="handleInput($event)"
    >
  </label>
  <div class="form-button-container">
    <button class="form-button" type="button" (click)="onButtonToggleClick()">
      <img [src]="buttonIcon" alt="eye">
    </button>
  </div>
</div>
