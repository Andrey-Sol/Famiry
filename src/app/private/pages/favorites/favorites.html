
<div class="favorites__subtitle">
  @if (favorites$ | async; as favorites) {
    Вы добавили {{ favorites.length }} фильмов
  } @else {
    Пока тут нет фильмов. Добавьте фильмы в избранное из каталога
  }
</div>

@if (favorites$ | async; as favorites) {
  <div class="favorites__cards">
    @for (favorite of favorites; track favorite.id) {
      <app-card [movie]="favorite"></app-card>
    }
  </div>
} @else {
  <div class="favorites__empty">
    <button type="button" routerLink="/private">В каталог</button>
  </div>
}
