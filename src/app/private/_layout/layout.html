
<div class="layout">
  <div class="container">
    <aside class="sidebar">
      <div class="logo">
        <img src="images/logo.png" alt="logo">
      </div>

      <form [formGroup]="searchForm" class="search">

        <app-input formControlName="search"
          prefixIconUrl="icons/search.svg"
          postfixIconUrl="icons/arrow.svg"
          placeholder="Поиск"
        ></app-input>

<!--        <div class="search__icon">-->
<!--          <img src="icons/search.svg" alt="search">-->
<!--        </div>-->
<!--        <label class="search__label">-->
<!--          <input class="search__input" type="text">-->

<!--        <div class="search__button">-->
<!--          <button type="button">-->
<!--            <img src="icons/arrow.svg" alt="arrow">-->
<!--          </button>-->
<!--        </div>-->
      </form>

      <form [formGroup]="genreSelect" class="genre">
        <div class="genre__title">Жанр</div>

        @for (genre of genres$ | async; track genre.id) {
          <div class="radio__item">

            <app-radio formControlName="genre" [title]="genre.name" name="genre"></app-radio>

          </div>
        }

      </form>

      <div class="release">
        <div class="release__title">Дата выхода</div>
        <div class="release__controls">
          <div class="date-control date-from">
            <label class="date-from__label">
              <select class="date-from__input" name="date-from">
                <option value="1999">1999</option>
                <option value="2000">2000</option>
                <option value="2001">2001</option>
              </select>
            </label>
          </div>
          <div class="date-control date-to">
            <label class="date-to__label">
              <input class="date-to__input" type="text" name="date-to" id="">
            </label>
          </div>
        </div>
      </div>

<!--          </label>-->
<!--        </div>-->

    </aside>

    <div class="content">
      <header class="header">

        <app-menu></app-menu>

      </header>

      <div class="dashboard">
        <div class="title">
          {{ title }}
        </div>

        <router-outlet></router-outlet>

      </div>
    </div>
  </div>

</div>
